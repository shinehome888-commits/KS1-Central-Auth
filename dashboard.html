<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>KS1 ALKEBULAN PAY – Dashboard</title>
  <style>
    body { background: #050A16; color: white; font-family: sans-serif; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; margin: 20px 0; }
    .btn { background: #D4AF37; color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; }
    .error { color: #ff6b6b; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>KS1 Identity Hub</h1>
    <div id="profile" class="card">Loading your profile...</div>
    <div id="debug" class="error" style="display:none;"></div>
    <button class="btn" onclick="logout()">Logout</button>
  </div>

  <script>
    // Immediately log what we have
    const token = localStorage.getItem('ks1_jwt_token');
    const debugEl = document.getElementById('debug');

    function logDebug(msg) {
      console.log('[Dashboard Debug]:', msg);
      debugEl.style.display = 'block';
      debugEl.textContent = msg;
    }

    if (!token) {
      logDebug('No token found in localStorage. Redirecting to login.');
      setTimeout(() => window.location.href = 'index.html', 2000);
      return;
    }

    // Verify token
    fetch('https://ks1-central-auth.onrender.com/auth/verify', {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${token}`
      }
    })
    .then(async (response) => {
      const text = await response.text();
      console.log('Auth verify response:', response.status, text);

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${text}`);
      }

      try {
        const user = JSON.parse(text);
        document.getElementById('profile').innerHTML = `
          <h2>Welcome!</h2>
          <p><strong>KS1 Trade ID:</strong> ${user.trade_id}</p>
          <p><strong>User ID:</strong> ${user.user_id}</p>
          <p><strong>Role:</strong> ${user.role || 'user'}</p>
        `;
      } catch (e) {
        throw new Error('Invalid JSON from auth service: ' + text);
      }
    })
    .catch((err) => {
      logDebug('Verification failed: ' + err.message);
      localStorage.removeItem('ks1_jwt_token');
      setTimeout(() => window.location.href = 'index.html', 3000);
    });

    function logout() {
      localStorage.removeItem('ks1_jwt_token');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
